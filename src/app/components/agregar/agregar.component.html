<section class="product-form-page bg-white dark:bg-gray-900">
  <div class="product-form-card py-8 px-4 mx-auto max-w-2xl lg:py-16">
    <header class="form-header">
      <p class="eyebrow">Inventario</p>
      <h2 class="text-xl font-bold text-gray-900 dark:text-white">{{ tituloFormulario }}</h2>
      <p class="helper-text">{{ textoAyudaFormulario }}</p>
    </header>

    <p *ngIf="mensajeFormulario()" data-testid="form-status" class="form-status" role="alert">{{ mensajeFormulario() }}</p>

    <form [formGroup]="agregarProductoForm" (ngSubmit)="agregarProducto()" novalidate>
      <div class="grid gap-4 sm:grid-cols-2 sm:gap-6">
        <div class="sm:col-span-2">
          <label for="id" class="field-label">ID</label>
          <input data-testid="product-id" formControlName="idN" type="text" name="id" id="id" class="field-control" placeholder="Escriba el ID" [attr.aria-invalid]="campoInvalido('idN')" aria-describedby="id-error" />
          <p *ngIf="campoInvalido('idN')" id="id-error" data-testid="id-error" class="field-error">{{ mensajeErrorCampo('idN') }}</p>
        </div>

        <div class="sm:col-span-2">
          <label for="nombre" class="field-label">Nombre del producto</label>
          <input formControlName="nombre" type="text" name="nombre" id="nombre" class="field-control" placeholder="Escriba el nombre del producto" [attr.aria-invalid]="campoInvalido('nombre')" aria-describedby="name-error" />
          <p *ngIf="campoInvalido('nombre')" id="name-error" data-testid="name-error" class="field-error">{{ mensajeErrorCampo('nombre') }}</p>
        </div>

        <div>
          <label for="cantidad" class="field-label">Cantidad</label>
          <input formControlName="cantidad" type="number" name="cantidad" id="cantidad" class="field-control" placeholder="12" [attr.aria-invalid]="campoInvalido('cantidad')" aria-describedby="quantity-error" />
          <p *ngIf="campoInvalido('cantidad')" id="quantity-error" data-testid="quantity-error" class="field-error">{{ mensajeErrorCampo('cantidad') }}</p>
        </div>

        <div class="sm:col-span-2">
          <label for="descripcion" class="field-label">Descripción</label>
          <textarea id="descripcion" formControlName="descripcion" rows="8" class="field-control" placeholder="Descripción del producto"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button [disabled]="loading()" type="submit" class="primary-action">{{ textoBotonGuardar }}</button>

        <button *ngIf="modoEdicion" data-testid="delete-product" type="button" [disabled]="eliminando()" (click)="eliminarProducto()" class="danger-action">{{ eliminando() ? "Eliminando..." : "Eliminar producto" }}</button>
      </div>
    </form>
  </div>
</section>
